<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; font-size: 13px; }
    body { padding: 14px; background: #f5f5f5; }
    h2 { font-size: 15px; font-weight: bold; margin-bottom: 14px; color: #333; }

    .field-group { margin-bottom: 12px; position: relative; }
    label { display: block; font-weight: bold; margin-bottom: 4px; color: #444; }
    input[type="text"] {
      width: 100%; padding: 6px 8px; border: 1px solid #bbb; border-radius: 3px;
      font-size: 13px; outline: none;
    }
    input[type="text"]:focus { border-color: #4a90d9; box-shadow: 0 0 0 2px rgba(74,144,217,0.2); }

    /* Autocomplete dropdown */
    .autocomplete-list {
      position: absolute; left: 0; right: 0; top: 100%; z-index: 999;
      background: #fff; border: 1px solid #bbb; border-top: none;
      max-height: 160px; overflow-y: auto;
      display: none;
      border-radius: 0 0 3px 3px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.12);
    }
    .autocomplete-list.visible { display: block; }
    .autocomplete-item {
      padding: 6px 10px; cursor: pointer; white-space: nowrap;
      border-bottom: 1px solid #f0f0f0;
    }
    .autocomplete-item:hover, .autocomplete-item.selected { background: #e8f0fe; }
    .autocomplete-item mark { background: #fff3cd; font-weight: bold; }

    /* Tabela máquinas */
    .section-title { font-weight: bold; margin: 14px 0 8px; color: #333; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #ddd; border-radius: 3px; overflow: hidden; }
    thead tr { background: #4a90d9; color: #fff; }
    th { padding: 7px 8px; text-align: left; font-size: 12px; }
    td { padding: 5px 8px; border-bottom: 1px solid #eee; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) td { background: #fafafa; }

    .badge {
      display: inline-block; padding: 2px 7px; border-radius: 10px;
      font-size: 10px; font-weight: bold; letter-spacing: 0.3px;
    }
    .badge-existente { background: #d4edda; color: #155724; border: 1px solid #b8dfc5; }
    .badge-novo      { background: #fff3cd; color: #856404; border: 1px solid #ffe4a0; }

    input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    input.tempo-input {
      width: 80px; padding: 4px 6px; border: 1px solid #bbb; border-radius: 3px;
      font-size: 12px; text-align: center; background: #f9f9f9;
    }
    input.tempo-input:focus { border-color: #4a90d9; background: #fff; }
    input.tempo-input.preenchido { background: #e8f8e8; border-color: #5cb85c; }
    input.tempo-input:disabled { background: #f0f0f0; color: #aaa; }

    /* Botão */
    .btn-row { margin-top: 16px; display: flex; gap: 8px; justify-content: flex-end; }
    button {
      padding: 7px 18px; border: none; border-radius: 3px; cursor: pointer; font-size: 13px; font-weight: bold;
    }
    .btn-enviar { background: #4a90d9; color: #fff; }
    .btn-enviar:hover { background: #357ab8; }
    .btn-limpar { background: #e0e0e0; color: #333; }
    .btn-limpar:hover { background: #ccc; }

    .status-msg { margin-top: 10px; padding: 8px 10px; border-radius: 3px; font-size: 12px; display: none; }
    .status-msg.ok { background: #d4edda; color: #155724; display: block; }
    .status-msg.erro { background: #f8d7da; color: #721c24; display: block; }
    .status-msg.info { background: #d1ecf1; color: #0c5460; display: block; }

    .spinner { display: none; text-align: center; padding: 8px; color: #666; }
    .spinner.visible { display: block; }
    .field-hint { font-size: 11px; color: #888; margin-top: 3px; min-height: 14px; }
  </style>
</head>
<body>

<h2>Inserir Dados do Produto</h2>

<!-- Referência -->
<div class="field-group">
  <label for="inputRef">Referência do Produto:</label>
  <input type="text" id="inputRef" placeholder="Digite a referência..." autocomplete="off">
  <div class="autocomplete-list" id="listRef"></div>
</div>

<!-- Cor -->
<div class="field-group">
  <label for="inputCor">Cor:</label>
  <input type="text" id="inputCor" placeholder="Digite a cor..." autocomplete="off">
  <div class="autocomplete-list" id="listCor"></div>
  <div class="field-hint" id="hintCor"></div>
</div>

<!-- Largura -->
<div class="field-group">
  <label for="inputLarg">Largura:</label>
  <input type="text" id="inputLarg" placeholder="Digite a largura..." autocomplete="off">
  <div class="autocomplete-list" id="listLarg"></div>
  <div class="field-hint" id="hintLarg"></div>
</div>

<!-- Tabela Máquinas -->
<div class="section-title">Selecione as Máquinas e informe (ou altere) o Tempo (horas) para cada uma:</div>
<table id="tblMaquinas">
  <thead>
    <tr>
      <th>Máquina</th>
      <th style="width:75px;text-align:center;">Status</th>
      <th style="width:80px;text-align:center;">Selecionar</th>
      <th style="width:90px;text-align:center;">Tempo (horas)</th>
    </tr>
  </thead>
  <tbody id="tbodyMaquinas">
    <tr><td colspan="4" style="text-align:center;color:#999;padding:16px;">Carregando...</td></tr>
  </tbody>
</table>

<div class="spinner" id="spinner">⏳ Processando...</div>
<div class="status-msg" id="statusMsg"></div>

<div class="btn-row">
  <button class="btn-limpar" onclick="limparForm()">Limpar</button>
  <button class="btn-enviar" onclick="enviarDados()">Enviar</button>
</div>

<script>
// ── Estado ──────────────────────────────────────────────────
var dadosServidor = { referencias: [], cores: [], larguras: [], maquinas: [] };
var dadosRef      = { cores: [], larguras: [], combinacoes: [], temposGerais: {} };
var temposExistentes = {};
// Valores de tempo digitados manualmente pelo usuário (preservados entre re-renders)
var temposUsuario = {};

// ── Inicialização ───────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  google.script.run
    .withSuccessHandler(function(dados) {
      dadosServidor = dados;
      renderizarTabela(dadosServidor.maquinas, {});
    })
    .withFailureHandler(function(e) {
      mostrarStatus('Erro ao carregar dados: ' + e.message, 'erro');
    })
    .carregarDadosCadastro();
});

// ── Fontes dinâmicas dos autocompletes ──────────────────────
function optsRef()  { return dadosServidor.referencias; }
function optsCor()  { return dadosRef.cores.length  > 0 ? dadosRef.cores  : dadosServidor.cores;  }
// Larguras da referência (cor não influencia — tempo é de ref+larg, não ref+cor+larg)
function optsLarg() {
  return dadosRef.larguras.length > 0 ? dadosRef.larguras : dadosServidor.larguras;
}

// ── Autocomplete genérico ───────────────────────────────────
function setupAutocomplete(inputId, listId, getOptions) {
  var inp = document.getElementById(inputId);
  var lst = document.getElementById(listId);
  var selectedIdx = -1;

  inp.addEventListener('input', function() {
    var val = inp.value.trim().toUpperCase();
    var opts = getOptions().filter(function(o) { return o.toUpperCase().indexOf(val) !== -1; });
    opts.sort(function(a, b) {
      var aS = a.toUpperCase().startsWith(val) ? 0 : 1;
      var bS = b.toUpperCase().startsWith(val) ? 0 : 1;
      return aS - bS || a.localeCompare(b);
    });
    renderList(lst, inp, opts, val);
    selectedIdx = -1;
  });

  inp.addEventListener('keydown', function(e) {
    var items = lst.querySelectorAll('.autocomplete-item');
    if (e.key === 'ArrowDown')      { selectedIdx = Math.min(selectedIdx + 1, items.length - 1); atualizarSelecao(items, selectedIdx); e.preventDefault(); }
    else if (e.key === 'ArrowUp')   { selectedIdx = Math.max(selectedIdx - 1, 0); atualizarSelecao(items, selectedIdx); e.preventDefault(); }
    else if (e.key === 'Enter' && selectedIdx >= 0) { items[selectedIdx].click(); e.preventDefault(); }
    else if (e.key === 'Escape')    { fecharLista(lst); }
  });

  document.addEventListener('click', function(e) { if (e.target !== inp) fecharLista(lst); });
}

function renderList(lst, inp, opts, query) {
  if (opts.length === 0 || !inp.value.trim()) { fecharLista(lst); return; }
  var html = '';
  opts.slice(0, 40).forEach(function(opt) {
    var esc = escapeHtml(opt);
    var hi  = esc;
    if (query) {
      var idx = opt.toUpperCase().indexOf(query.toUpperCase());
      if (idx !== -1) hi = escapeHtml(opt.substring(0, idx)) + '<mark>' + escapeHtml(opt.substring(idx, idx + query.length)) + '</mark>' + escapeHtml(opt.substring(idx + query.length));
    }
    html += '<div class="autocomplete-item" data-value="' + esc + '">' + hi + '</div>';
  });
  lst.innerHTML = html;
  lst.classList.add('visible');
  lst.querySelectorAll('.autocomplete-item').forEach(function(item) {
    item.addEventListener('click', function() {
      inp.value = item.getAttribute('data-value');
      fecharLista(lst);
      inp.dispatchEvent(new Event('change'));
    });
  });
}

function atualizarSelecao(items, idx) {
  items.forEach(function(el, i) { el.classList.toggle('selected', i === idx); });
  if (items[idx]) items[idx].scrollIntoView({ block: 'nearest' });
}
function fecharLista(lst) { lst.classList.remove('visible'); lst.innerHTML = ''; }
function escapeHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Setup autocompletes ─────────────────────────────────────
setupAutocomplete('inputRef',  'listRef',  optsRef);
setupAutocomplete('inputCor',  'listCor',  optsCor);
setupAutocomplete('inputLarg', 'listLarg', optsLarg);

// ── Eventos ─────────────────────────────────────────────────

// Ref: busca dados ao digitar (debounce 400ms, mín. 2 caracteres)
var _debRef = null;
document.getElementById('inputRef').addEventListener('input', function() {
  clearTimeout(_debRef);
  var val = this.value.trim();
  if (val.length < 2) {
    dadosRef = { cores: [], larguras: [], combinacoes: [], temposGerais: {} };
    temposExistentes = {};
    temposUsuario = {};
    setHint('hintCor', ''); setHint('hintLarg', '');
    renderizarTabela(dadosServidor.maquinas, {});
    return;
  }
  temposUsuario = {};
  _debRef = setTimeout(buscarPorReferencia, 400);
});
document.getElementById('inputRef').addEventListener('change', function() {
  clearTimeout(_debRef);  // evita chamada dupla (debounce + change)
  if (this.value.trim().length >= 2) buscarPorReferencia();
});

// Cor: cor não tem relação com tempos nem com badges — só atualiza hint de larguras
document.getElementById('inputCor').addEventListener('change', function() {
  atualizarHintLarg();
});

// Largura: carrega tempos da combinação selecionada (nova largura = limpa valores manuais)
document.getElementById('inputLarg').addEventListener('change', function() {
  temposUsuario = {};
  carregarTemposPorCombinacao();
});

// ── Busca dados da referência (1 chamada ao servidor) ───────
function buscarPorReferencia() {
  var ref = document.getElementById('inputRef').value.trim();
  if (!ref) return;

  google.script.run
    .withSuccessHandler(function(dados) {
      dadosRef = dados || { cores: [], larguras: [], combinacoes: [], temposGerais: {} };

      // Hints de cor e largura
      setHint('hintCor',  dadosRef.cores.length    > 0 ? dadosRef.cores.length    + ' cor(es) disponível(is)' : 'Cor nova');
      setHint('hintLarg', dadosRef.larguras.length  > 0 ? dadosRef.larguras.length + ' largura(s) disponível(is)' : 'Largura nova');

      // Renderiza respeitando cor/larg já preenchidos pelo usuário (pode ter digitado
      // antes da resposta chegar); se estiverem vazios, carregarTemposPorCombinacao
      // cai no branch temposGerais normalmente
      carregarTemposPorCombinacao();
    })
    .withFailureHandler(function(e) {
      mostrarStatus('Erro ao buscar referência: ' + e.message, 'erro');
    })
    .buscarDadosPorReferencia(ref);
}

// ── Carrega tempos para ref+larg (cor não tem relação com o tempo) ──
function carregarTemposPorCombinacao() {
  var larg = document.getElementById('inputLarg').value.trim().toUpperCase();
  var largExiste = larg && dadosRef.larguras.some(function(l) { return l.toUpperCase() === larg; });

  // Sem largura → mostra tempos gerais da referência
  if (!larg) {
    renderizarTabela(dadosServidor.maquinas, dadosRef.temposGerais || {}, {});
    return;
  }

  // Largura nova (não existe na ref) → campos em branco para o usuário preencher
  if (!largExiste) {
    renderizarTabela(dadosServidor.maquinas, {}, {});
    return;
  }

  // Largura existente → coleta todos os tempos para ref+larg (de qualquer cor)
  // Badge "Existente" = ref+larg já cadastrada naquela máquina (cor não importa)
  var t = {};
  dadosRef.combinacoes.forEach(function(c) {
    if (c.larg.toUpperCase() === larg) {
      for (var aba in c.tempos) { if (t[aba] === undefined) t[aba] = c.tempos[aba]; }
    }
  });

  // temposExatos = mesmos que temposExibir: existência é baseada em ref+larg
  renderizarTabela(dadosServidor.maquinas, t, t);
}

function atualizarHintLarg() {
  var n = dadosRef.larguras.length;
  setHint('hintLarg', n > 0 ? n + ' largura(s) disponível(is) na referência' : '');
}

function setHint(id, txt) {
  var el = document.getElementById(id);
  if (el) el.textContent = txt;
}

// ── Renderizar tabela de máquinas ───────────────────────────
// tempos: valores a exibir nos campos (podem ser sugestões de outra cor)
// temposExatos: combinação cor+larg exata — define badge "Existente" e checkbox marcada
function renderizarTabela(maquinas, tempos, temposExatos) {
  temposExatos = temposExatos || {};
  var tbody = document.getElementById('tbodyMaquinas');
  if (!maquinas || maquinas.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#999;padding:16px;">Nenhuma máquina encontrada.</td></tr>';
    return;
  }
  var html = '';
  maquinas.forEach(function(m) {
    // Prioridade: valor digitado pelo usuário > sugestão do banco > vazio
    var tempoSugestao = tempos[m.nomeAba] !== undefined ? tempos[m.nomeAba] : '';
    var tempo = temposUsuario[m.nomeAba] !== undefined ? temposUsuario[m.nomeAba] : tempoSugestao;
    var exato  = temposExatos[m.nomeAba] !== undefined;  // combinação exata existe
    var badge  = exato
      ? '<span class="badge badge-existente">Existente</span>'
      : '<span class="badge badge-novo">Novo</span>';
    // Checkbox marcada apenas quando combinação exata existe; senão o usuário escolhe
    var checked = exato ? 'checked' : '';
    html += '<tr>';
    html += '<td>' + escapeHtml(m.nomeMaquina) + '</td>';
    html += '<td style="text-align:center;">' + badge + '</td>';
    html += '<td style="text-align:center;"><input type="checkbox" class="chk-maquina" data-aba="' + escapeHtml(m.nomeAba) + '" ' + checked + '></td>';
    html += '<td style="text-align:center;"><input type="text" class="tempo-input' + (tempo !== '' ? ' preenchido' : '') + '" data-aba="' + escapeHtml(m.nomeAba) + '" value="' + escapeHtml(String(tempo)) + '" placeholder="Tempo"></td>';
    html += '</tr>';
  });
  tbody.innerHTML = html;

  // Captura qualquer digitação no campo de tempo para não perder ao re-renderizar
  tbody.querySelectorAll('.tempo-input').forEach(function(inp) {
    inp.addEventListener('input', function() {
      temposUsuario[this.getAttribute('data-aba')] = this.value;
      this.classList.toggle('preenchido', this.value.trim() !== '');
    });
  });
}

// ── Enviar dados ────────────────────────────────────────────
function enviarDados() {
  var ref  = document.getElementById('inputRef').value.trim();
  var cor  = document.getElementById('inputCor').value.trim();
  var larg = document.getElementById('inputLarg').value.trim();

  if (!ref)  { mostrarStatus('Informe a Referência do Produto.', 'erro'); return; }
  if (!cor)  { mostrarStatus('Informe a Cor.', 'erro'); return; }
  if (!larg) { mostrarStatus('Informe a Largura.', 'erro'); return; }

  var selecionadas = [];
  var temErro = false;
  document.querySelectorAll('.chk-maquina:checked').forEach(function(chk) {
    var nomeAba    = chk.getAttribute('data-aba');
    var tempoInput = document.querySelector('.tempo-input[data-aba="' + nomeAba + '"]');
    var tempo      = parseFloat((tempoInput ? tempoInput.value.trim() : '').replace(',', '.'));
    if (isNaN(tempo) || tempo <= 0) { temErro = true; return; }
    selecionadas.push({ nomeAba: nomeAba, tempo: tempo });
  });

  if (temErro) { mostrarStatus('Informe um tempo válido para todas as máquinas selecionadas.', 'erro'); return; }
  if (selecionadas.length === 0) { mostrarStatus('Selecione ao menos uma máquina.', 'erro'); return; }

  document.getElementById('spinner').classList.add('visible');
  document.getElementById('statusMsg').className = 'status-msg';

  google.script.run
    .withSuccessHandler(function(resultado) {
      document.getElementById('spinner').classList.remove('visible');
      if (resultado.ok) {
        mostrarStatus('✔ Cadastro realizado em ' + resultado.inseridos + ' aba(s)!', 'ok');
        setTimeout(limparForm, 2000);
      } else {
        mostrarStatus('⚠ ' + resultado.msg, 'erro');
      }
    })
    .withFailureHandler(function(e) {
      document.getElementById('spinner').classList.remove('visible');
      mostrarStatus('Erro ao salvar: ' + e.message, 'erro');
    })
    .inserirCadastroPedido({ referencia: ref, cor: cor, largura: larg, maquinas: selecionadas });
}

// ── Limpar formulário ───────────────────────────────────────
function limparForm() {
  ['inputRef','inputCor','inputLarg'].forEach(function(id) { document.getElementById(id).value = ''; });
  ['hintCor','hintLarg'].forEach(function(id) { setHint(id, ''); });
  dadosRef = { cores: [], larguras: [], combinacoes: [], temposGerais: {} };
  temposExistentes = {};
  temposUsuario = {};
  renderizarTabela(dadosServidor.maquinas, {});
  document.getElementById('statusMsg').className = 'status-msg';
}

// ── Status ──────────────────────────────────────────────────
function mostrarStatus(msg, tipo) {
  var el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg ' + tipo;
}
</script>
</body>
</html>
