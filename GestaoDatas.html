<!DOCTYPE html>
<!--
  ════════════════════════════════════════════════════════════════
  PADRÃO OBRIGATÓRIO — LOADING STATE (leia antes de editar)
  ════════════════════════════════════════════════════════════════
  TODA chamada a google.script.run DEVE seguir este padrão:

    setAguarde(true, "mensagem ao usuário...");
    google.script.run
      .withSuccessHandler(function(resultado) {
        setAguarde(false);
        // ... tratar resultado
      })
      .withFailureHandler(function(e) {
        setAguarde(false);
        mostrarErro(e);
      })
      .nomeDaFuncaoNoServidor(args);

  setAguarde(sim, msg):
    - true  → exibe overlay "⏳ Aguarde..." cobrindo todo o dialog
               e desabilita todos os botões de ação
    - false → remove overlay e reabilita botões

  NUNCA remova este padrão. O Google Apps Script pode demorar
  vários segundos por chamada — o usuário PRECISA do feedback visual.
  ════════════════════════════════════════════════════════════════
-->
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 13px; color: #202124; background: #fff; padding: 16px; }

  h2 { font-size: 15px; font-weight: 600; color: #1a73e8; margin-bottom: 14px; }
  h3 { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 8px; }

  .card {
    border: 1px solid #dadce0;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 12px;
    background: #fafafa;
  }

  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
  label { display: block; font-size: 12px; color: #555; margin-bottom: 3px; }

  input[type="date"], select {
    height: 32px;
    border: 1px solid #c5c8cc;
    border-radius: 4px;
    padding: 0 8px;
    font-size: 13px;
    outline: none;
  }
  input[type="date"]:focus, select:focus { border-color: #1a73e8; }

  .btn {
    height: 32px;
    padding: 0 14px;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-primary { background: #1a73e8; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #1558b0; }
  .btn-primary:disabled { background: #a8c7fa; cursor: not-allowed; }
  .btn-danger  { background: #ea4335; color: #fff; font-size: 11px; padding: 0 8px; height: 26px; border-radius: 3px; border: none; cursor: pointer; }
  .btn-danger:hover { background: #c5221f; }

  /* ── Overlay de aguarde ────────────────────────────────── */
  #overlay-aguarde {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.82);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }
  #overlay-aguarde.visivel { display: flex; }
  #overlay-aguarde .ov-spinner {
    width: 36px; height: 36px;
    border: 4px solid #c5cae9;
    border-top-color: #1a73e8;
    border-radius: 50%;
    animation: spin .75s linear infinite;
  }
  #overlay-aguarde .ov-msg {
    font-size: 14px; font-weight: 600; color: #1a73e8;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Lista de datas */
  #lista-wrap {
    max-height: 230px;
    overflow-y: auto;
    border: 1px solid #dadce0;
    border-radius: 6px;
    background: #fff;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    position: sticky; top: 0; background: #f1f3f4;
    font-size: 11px; font-weight: 600; color: #555;
    padding: 6px 10px; text-align: left;
    border-bottom: 1px solid #dadce0;
  }
  td { padding: 5px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8f9fa; }

  .badge-fim  { background: #e8f0fe; color: #1a73e8; padding: 1px 6px; border-radius: 10px; font-size: 11px; }
  .badge-fer  { background: #fce8e6; color: #c5221f; padding: 1px 6px; border-radius: 10px; font-size: 11px; }

  /* Resultado da busca */
  #busca-resultado {
    margin-top: 8px; padding: 8px 12px;
    border-radius: 6px; font-size: 13px; font-weight: 600; display: none;
  }
  #busca-resultado.encontrada     { background: #e6f4ea; color: #1e8e3e; border: 1px solid #a8d5b5; }
  #busca-resultado.nao-encontrada { background: #fce8e6; color: #c5221f; border: 1px solid #f5b7b1; }

  /* Checkboxes */
  .chk-row { display: flex; gap: 16px; margin-top: 6px; }
  .chk-row label { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #333; cursor: pointer; margin: 0; }

  /* Status bar */
  #status { margin-top: 8px; font-size: 12px; min-height: 18px; }
  .ok  { color: #1e8e3e; }
  .err { color: #c5221f; }

  .footer { display: flex; justify-content: flex-end; margin-top: 10px; }
  .btn-close { background: #f1f3f4; color: #444; border: 1px solid #dadce0; }
  .btn-close:hover { background: #e8eaed; }
</style>
</head>
<body>

<!-- ── Overlay de aguarde (padrão obrigatório — ver comentário no topo) ── -->
<div id="overlay-aguarde">
  <div class="ov-spinner"></div>
  <div class="ov-msg" id="overlay-msg">Aguarde...</div>
</div>

<h2>📅 Datas Fora de Programação</h2>

<!-- Adicionar data específica -->
<div class="card">
  <h3>Adicionar data específica</h3>
  <div class="row" style="margin-top:6px;">
    <div>
      <label>Data</label>
      <input type="date" id="inp-data">
    </div>
    <button class="btn btn-primary" id="btn-adicionar" onclick="adicionarDataEspecifica()">Adicionar</button>
  </div>
</div>

<!-- Bloquear finais de semana -->
<div class="card">
  <h3>Bloquear finais de semana por ano</h3>
  <div class="row" style="margin-top:6px;">
    <div>
      <label>Ano</label>
      <select id="sel-ano"></select>
    </div>
    <div>
      <label>&nbsp;</label>
      <div class="chk-row">
        <label><input type="checkbox" id="chk-sab" checked> Sábados</label>
        <label><input type="checkbox" id="chk-dom" checked> Domingos</label>
      </div>
    </div>
    <button class="btn btn-primary" id="btn-bloquear" onclick="adicionarFimDeSemana()">Bloquear</button>
  </div>
</div>

<!-- Consultar data -->
<div class="card">
  <h3>🔍 Consultar se uma data está bloqueada</h3>
  <div class="row" style="margin-top:6px;">
    <div>
      <label>Data para consultar</label>
      <input type="date" id="inp-busca" oninput="consultarData()">
    </div>
    <button class="btn btn-primary" onclick="consultarData()">Consultar</button>
  </div>
  <div id="busca-resultado"></div>
</div>

<!-- Lista de datas bloqueadas -->
<div class="card" style="padding-bottom:10px;">
  <h3>Datas já bloqueadas <span id="contador" style="font-weight:400;color:#888;"></span></h3>
  <div id="lista-wrap" style="margin-top:8px;">
    <div style="padding:18px;text-align:center;color:#888;font-style:italic;">Carregando...</div>
  </div>
</div>

<div id="status"></div>

<div class="footer">
  <button class="btn btn-close" id="btn-fechar" onclick="google.script.host.close()">Fechar</button>
</div>

<script>
  var _datas = []; // array de strings DD/MM/YYYY (estado local)
  var DIAS   = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];

  // IDs dos botões de ação que devem ser bloqueados durante carregamento
  var BTNS_ACAO = ["btn-adicionar", "btn-bloquear", "btn-fechar"];

  // ── Popula selector de anos ─────────────────────────────────
  (function() {
    var anoAtual = new Date().getFullYear();
    var sel = document.getElementById("sel-ano");
    for (var a = anoAtual - 2; a <= anoAtual + 3; a++) {
      var opt = document.createElement("option");
      opt.value = a; opt.textContent = a;
      if (a === anoAtual) opt.selected = true;
      sel.appendChild(opt);
    }
    document.getElementById("inp-data").value = toInputDate(new Date());
  })();

  // ── Carga inicial ────────────────────────────────────────────
  // (padrão obrigatório: setAguarde antes, setAguarde(false) nos handlers)
  setAguarde(true, "Carregando datas bloqueadas...");
  google.script.run
    .withSuccessHandler(function(lista) {
      setAguarde(false);
      _datas = lista || [];
      renderLista();
    })
    .withFailureHandler(function(e) {
      setAguarde(false);
      mostrarErro(e);
    })
    .lerDatasBlockeadas();

  /* ─── overlay de aguarde ─────────────────────────────────────
   * PADRÃO OBRIGATÓRIO — chamar em TODA google.script.run
   * sim=true  → exibe overlay + desabilita botões
   * sim=false → oculta overlay + reabilita botões
   */
  function setAguarde(sim, msg) {
    var overlay = document.getElementById("overlay-aguarde");
    overlay.classList.toggle("visivel", sim);
    if (msg) document.getElementById("overlay-msg").textContent = msg;
    BTNS_ACAO.forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.disabled = sim;
    });
  }

  /* ─── helpers ─────────────────────────────────────────────── */

  function toInputDate(d) {
    var mm = String(d.getMonth()+1).padStart(2,"0");
    var dd = String(d.getDate()).padStart(2,"0");
    return d.getFullYear() + "-" + mm + "-" + dd;
  }

  function toDMY(isoStr) {
    var p = isoStr.split("-");
    return p[2] + "/" + p[1] + "/" + p[0];
  }

  function parseDMY(s) {
    var p = s.split("/");
    return new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
  }

  function diaSemana(s) { return DIAS[parseDMY(s).getDay()]; }
  function anoDeData(s)  { return s.split("/")[2]; }

  /* ─── renderizar lista ────────────────────────────────────── */

  function renderLista() {
    if (document.getElementById("inp-busca").value) consultarData();
    var wrap = document.getElementById("lista-wrap");
    document.getElementById("contador").textContent = _datas.length > 0
      ? "(" + _datas.length + " data" + (_datas.length > 1 ? "s" : "") + ")"
      : "";

    if (_datas.length === 0) {
      wrap.innerHTML = '<div style="padding:18px;text-align:center;color:#888;font-style:italic;">Nenhuma data bloqueada.</div>';
      return;
    }

    var html = '<table><thead><tr>'
      + '<th>Data</th><th>Dia da Semana</th><th>Ano</th><th>Tipo</th><th></th>'
      + '</tr></thead><tbody>';

    _datas.forEach(function(d, idx) {
      var dia  = diaSemana(d);
      var ano  = anoDeData(d);
      var fim  = (dia === "Sábado" || dia === "Domingo");
      var badge = fim
        ? '<span class="badge-fim">' + dia + '</span>'
        : '<span class="badge-fer">Feriado/Especial</span>';

      html += '<tr>'
        + '<td><b>' + d + '</b></td>'
        + '<td>' + dia + '</td>'
        + '<td>' + ano + '</td>'
        + '<td>' + badge + '</td>'
        + '<td><button class="btn-danger" onclick="excluirData(' + idx + ')">Excluir</button></td>'
        + '</tr>';
    });

    html += '</tbody></table>';
    wrap.innerHTML = html;
  }

  /* ─── adicionar data específica ──────────────────────────── */

  function adicionarDataEspecifica() {
    var val = document.getElementById("inp-data").value;
    if (!val) { mostrarErro("Selecione uma data."); return; }
    var dmy = toDMY(val);
    if (_datas.indexOf(dmy) !== -1) { mostrarErro("Data " + dmy + " já está na lista."); return; }
    _datas.push(dmy);
    salvar("Data " + dmy + " adicionada.");
  }

  /* ─── bloquear finais de semana ──────────────────────────── */

  function adicionarFimDeSemana() {
    var ano = parseInt(document.getElementById("sel-ano").value);
    var sab = document.getElementById("chk-sab").checked;
    var dom = document.getElementById("chk-dom").checked;
    if (!sab && !dom) { mostrarErro("Selecione pelo menos Sábado ou Domingo."); return; }

    var adicionadas = 0;
    var d = new Date(ano, 0, 1);
    while (d.getFullYear() === ano) {
      var dow = d.getDay();
      if ((dow === 6 && sab) || (dow === 0 && dom)) {
        var dd  = String(d.getDate()).padStart(2,"0");
        var mm  = String(d.getMonth()+1).padStart(2,"0");
        var dmy = dd + "/" + mm + "/" + ano;
        if (_datas.indexOf(dmy) === -1) { _datas.push(dmy); adicionadas++; }
      }
      d.setDate(d.getDate() + 1);
    }

    if (adicionadas === 0) {
      mostrarErro("Todos os " + (sab && dom ? "sábados e domingos" : sab ? "sábados" : "domingos") + " de " + ano + " já estão na lista.");
      return;
    }
    salvar(adicionadas + " dia(s) de fim de semana de " + ano + " adicionados.");
  }

  /* ─── consultar data ─────────────────────────────────────── */

  function consultarData() {
    var val = document.getElementById("inp-busca").value;
    var res = document.getElementById("busca-resultado");
    if (!val) { res.style.display = "none"; return; }

    var dmy = toDMY(val);
    var dia = diaSemana(dmy);
    var ano = anoDeData(dmy);
    var idx = _datas.indexOf(dmy);
    var fim = (dia === "Sábado" || dia === "Domingo");

    res.style.display = "block";
    if (idx !== -1) {
      res.className = "encontrada";
      res.innerHTML = "✅ <b>" + dmy + "</b> (" + dia + ", " + ano + ") — "
        + (fim ? "Fim de semana bloqueado" : "Feriado / data especial bloqueada")
        + " &nbsp;<button class=\"btn-danger\" onclick=\"excluirData(" + idx + ");document.getElementById('busca-resultado').style.display='none';\">Excluir</button>";
    } else {
      res.className = "nao-encontrada";
      res.innerHTML = "❌ <b>" + dmy + "</b> (" + dia + ", " + ano + ") — <b>não está</b> na lista de datas bloqueadas.";
    }
  }

  /* ─── excluir data ───────────────────────────────────────── */

  function excluirData(idx) {
    var d = _datas[idx];
    _datas.splice(idx, 1);
    salvar("Data " + d + " removida.");
  }

  /* ─── salvar ─────────────────────────────────────────────────
   * (padrão obrigatório: setAguarde antes, setAguarde(false) nos handlers)
   */
  function salvar(msg) {
    setStatus("");
    setAguarde(true, "Salvando...");
    var copia = _datas.slice();
    google.script.run
      .withSuccessHandler(function() {
        // Recarrega do servidor para garantir consistência
        setAguarde(true, "Atualizando lista...");
        google.script.run
          .withSuccessHandler(function(lista) {
            setAguarde(false);
            _datas = lista || [];
            renderLista();
            setStatus('<span class="ok">✔ ' + msg + '</span>');
          })
          .withFailureHandler(function(e) {
            setAguarde(false);
            mostrarErro(e);
          })
          .lerDatasBlockeadas();
      })
      .withFailureHandler(function(e) {
        setAguarde(false);
        mostrarErro(e);
      })
      .salvarDatasBlockeadas(copia);
  }

  /* ─── status / erro ──────────────────────────────────────── */

  function setStatus(html) { document.getElementById("status").innerHTML = html; }

  function mostrarErro(e) {
    setStatus('<span class="err">⚠ ' + (e.message || e) + '</span>');
  }
</script>
</body>
</html>
